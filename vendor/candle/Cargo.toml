[workspace]
members = [
    "candle-core",
    "candle-flash-attn",
    "candle-kernels",
    "candle-metal-kernels",
    "candle-nn",
    "candle-transformers",
    "candle-ug",
]
resolver = "2"

[workspace.package]
version = "0.9.2"
edition = "2021"
description = "Minimalist ML framework."
repository = "https://github.com/huggingface/candle"
keywords = ["blas", "tensor", "machine-learning"]
categories = ["science"]
license = "MIT OR Apache-2.0"
